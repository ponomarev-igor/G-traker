name: Fetch Garmin Data

on:
  schedule:
    - cron: '0 6 * * *'  # Каждый день в 6:00 UTC (9:00 Астана)
  workflow_dispatch:       # Можно запустить вручную

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore Garmin session cache
        id: garmin-cache
        uses: actions/cache/restore@v4
        with:
          path: .garth
          key: garmin-session-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            garmin-session-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install garth

      - name: Fetch Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARMIN_MFA_CODE: ${{ secrets.GARMIN_MFA_CODE }}
          GARMIN_TOKEN_DIR: .garth
        run: python fetch_garmin.py

      - name: Save Garmin session cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .garth
          key: ${{ steps.garmin-cache.outputs.cache-primary-key }}

      - name: Commit and push
        run: |
          git config user.email "garry@navigator.com"
          git config user.name "Garry Navigator Bot"
          git add garmin.json
          git diff --staged --quiet || git commit -m "Update Garmin data $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
